# https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance + attestation signing
  packages: write # GitHub Packages
  attestations: write # build provenance attestation

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Set up Node + npm registry
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build artifacts exist before publishing
        run: |
          test -f lib/cjs/index.js
          test -f lib/esm/index.mjs
          test -f lib/types/index.d.ts

      - name: Attest build provenance for the shipped bundles
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "lib/**/*"

      # Trusted Publishing (OIDC) needs npm >= 11.5.1. Pin the CLI so publishing
      # cannot break when a new npm major is released with incompatible packaging.
      - name: Install npm for Trusted Publishing
        run: npm install -g npm@11.11.0 --min-release-age=0

      # No NPM_TOKEN: npm exchanges the GitHub OIDC token for a short-lived
      # publish token via the Trusted Publisher configured on npmjs.com.
      # Provenance is generated automatically under trusted publishing.
      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --provenance --access public

      - name: Set up .npmrc for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: "https://npm.pkg.github.com"
          # Defaults to the user or organization that owns the workflow file
          scope: "@gyng"

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
