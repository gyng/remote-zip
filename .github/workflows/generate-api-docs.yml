name: Generate and publish API documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

# Official GitHub Pages deployment. Set Pages source to "GitHub Actions" in the
# repository settings (Settings -> Pages -> Build and deployment -> Source).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Install isolated TypeDoc toolchain
        run: npm ci --prefix tools/typedoc

      - name: Build the site (landing page + demo + API docs under /api)
        run: npm run doc:site

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
