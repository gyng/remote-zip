name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
      - release/*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:coverage

  # Stable required-check target: one "Test" status regardless of the matrix,
  # so branch protection can require a single context.
  test-result:
    name: Test
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all matrix legs passed
        run: |
          [ "${{ needs.test.result }}" = "success" ] || exit 1
